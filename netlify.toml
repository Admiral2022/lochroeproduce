[build]
  publish = "."
  functions = "netlify/functions"

[[headers]]
  for = "/admin.html"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0, s-maxage=0"
    Pragma = "no-cache"
    Expires = "0"

[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0, s-maxage=0"
    Pragma = "no-cache"
    Expires = "0"
