<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Payment Completed | Loch Roe Produce</title>

  <style>
    *{
      box-sizing:border-box;
    }

    html, body{
      margin:0;
      padding:0;
    }

    body{
      font-family:Arial, Helvetica, sans-serif;
      background:#f3f3f3;
      color:#222222;
      text-align:center;
    }

    .photo-band{
background-image:url("sunrise.jpg");
background-size:cover;
background-position:center 42%;
background-repeat:no-repeat;
min-height:28vh;
padding:30px 20px;
}

    .title{
      margin:0;
      font-size:clamp(1.8rem, 4.4vw, 3rem);
      font-weight:700;
      color:#000000;
    }

    .success-band{
      background:#f3f3f3;
      padding:40px 20px 44px;
    }

    .wrap{
      max-width:900px;
      margin:0 auto;
    }

    .success-title{
      margin:0 0 14px;
      font-size:clamp(2rem, 4.5vw, 3.2rem);
      font-weight:700;
      color:#000000;
    }

    .success-text{
      font-size:clamp(1.1rem, 2vw, 1.4rem);
      font-weight:600;
      line-height:1.5;
      margin:0 0 26px;
      color:#333333;
    }

    .code-label{
      font-size:clamp(1.2rem, 2.1vw, 1.6rem);
      font-weight:600;
      color:#000000;
      margin-bottom:8px;
    }

    .code-box{
      display:inline-block;
      min-width:220px;
      padding:20px 24px;
      background:#ffffff;
      border:2px solid #d8d8d8;
      border-radius:12px;
      font-size:clamp(3rem, 8vw, 5rem);
      font-weight:700;
      letter-spacing:10px;
      color:#6F42C1;
      margin-bottom:22px;
    }

    .code-note{
      font-size:clamp(1rem, 1.9vw, 1.2rem);
      font-weight:600;
      color:#333333;
      line-height:1.5;
      margin:0 0 30px;
    }

    .instructions-box{
      margin:0 auto;
      max-width:760px;
      background:#e9e9e9;
      padding:18px 18px;
      border-radius:10px;
      font-size:clamp(1rem, 1.9vw, 1.2rem);
      font-weight:700;
      line-height:1.55;
      color:#222222;
    }

    .address-footer{
      margin-top:28px;
      font-size:clamp(1rem, 1.8vw, 1.2rem);
      color:#333333;
      line-height:1.45;
      font-weight:600;
    }

    .back-link{
      display:inline-block;
      margin-top:28px;
      font-size:1rem;
      color:#1f1f1f;
      text-decoration:none;
      border-bottom:1px solid #1f1f1f;
      padding-bottom:2px;
    }

    .back-link:hover{
      opacity:0.75;
    }

    @media (max-width:800px){
      .success-band{
        padding:30px 16px 34px;
      }

      .photo-band{
        padding:22px 16px;
      }

      .code-box{
        min-width:180px;
        letter-spacing:7px;
      }
    }
  </style>
</head>
<body>

  <section class="photo-band">
    <h1 class="title">Loch Roe Produce</h1>
  </section>

  <section class="success-band">
    <div class="wrap">

      <h2 class="success-title">Payment Completed</h2>

      <p class="success-text">
        Thank you.<br> 
        Your payment has been received.
      </p>

      <div class="code-label">Your 4-digit produce box code</div>

      <div class="code-box" id="doorCode">4827</div>

      <p class="code-note" id="codeNote">
        Enter this code on the keypad to open the produce box.
      </p>

      <div class="instructions-box">
        Please collect your produce promptly.
      </div>

      <div class="address-footer">
        Windy Hollow<br>
        Achmelvich, Lochinver IV27 4JB
      </div>

      <a class="back-link" href="index.html">Return to produce page</a>

    </div>
  </section>

</body>
</html>
