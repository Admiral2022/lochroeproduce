<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Loch Roe Produce – Stock Admin</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<style>
body{
  font-family:Arial,Helvetica,sans-serif;
  background:#f3f3f3;
  text-align:center;
  padding:40px;
}

.box{
  background:white;
  max-width:420px;
  margin:auto;
  padding:30px;
  border-radius:10px;
  box-shadow:0 0 12px rgba(0,0,0,0.1);
}

h2{
  margin-top:0;
}

input{
  width:80%;
  font-size:20px;
  padding:8px;
  margin:10px;
  text-align:center;
}

button{
  font-size:20px;
  padding:10px 20px;
  margin-top:20px;
  background:#1f8a3b;
  color:white;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

button:hover{
  background:#156b2c;
}

button:disabled{
  opacity:0.6;
  cursor:not-allowed;
}

.status{
  margin-top:16px;
  font-size:16px;
  color:#333;
  min-height:24px;
}
</style>
</head>

<body>

<div class="box" autocomplete="off">

  <h2>Stock Control</h2>

  <div>
    Egg boxes<br>
    <input id="eggs" type="number" min="0" autocomplete="off">
  </div>

  <div>
    Honey jars<br>
    <input id="honey" type="number" min="0" autocomplete="off">
  </div>

  <div>
    Password<br>
    <input id="password" type="password" autocomplete="new-password">
  </div>

  <button id="updateBtn" type="button">Update Stock</button>

  <div class="status" id="status"></div>

</div>

<script>
async function loadStock() {
  const status = document.getElementById("status");

  try {
    const res = await fetch("/.netlify/functions/get-stock?ts=" + Date.now(), {
      method: "GET",
      cache: "no-store",
      headers: {
        "Cache-Control": "no-cache, no-store, max-age=0",
        "Pragma": "no-cache"
      }
    });

    if (!res.ok) {
      throw new Error("Failed to load stock");
    }

    const data = await res.json();

    document.getElementById("eggs").value = Number(data.eggs || 0);
    document.getElementById("honey").value = Number(data.honey || 0);
    status.textContent = "";
  } catch (error) {
    status.textContent = "Could not load stock";
  }
}

async function updateStock() {
  const eggsInput = document.getElementById("eggs");
  const honeyInput = document.getElementById("honey");
  const passwordInput = document.getElementById("password");
  const button = document.getElementById("updateBtn");
  const status = document.getElementById("status");

  button.disabled = true;
  status.textContent = "Updating stock...";

  try {
    const res = await fetch("/.netlify/functions/set-stock?ts=" + Date.now(), {
      method: "POST",
      cache: "no-store",
      headers: {
        "Content-Type": "application/json",
        "Cache-Control": "no-cache, no-store, max-age=0",
        "Pragma": "no-cache"
      },
      body: JSON.stringify({
        eggs: eggsInput.value,
        honey: honeyInput.value,
        password: passwordInput.value
      })
    });

    const text = await res.text();

    if (!res.ok) {
      status.textContent = "Error: " + text;
      button.disabled = false;
      return;
    }

    const data = JSON.parse(text);

    eggsInput.value = Number(data.eggs || 0);
    honeyInput.value = Number(data.honey || 0);
    passwordInput.value = "";
    status.textContent = "Stock updated.";
    button.disabled = false;

  } catch (error) {
    status.textContent = "Network error: " + error.message;
    button.disabled = false;
  }
}

document.getElementById("updateBtn").addEventListener("click", updateStock);
window.addEventListener("pageshow", loadStock);
window.addEventListener("load", loadStock);

/* auto refresh stock every 5 seconds */
setInterval(() => {
  const eggs = document.getElementById("eggs");
  const honey = document.getElementById("honey");
  const password = document.getElementById("password");

  const typingNow =
    document.activeElement === eggs ||
    document.activeElement === honey ||
    document.activeElement === password;

  if (!typingNow) {
    loadStock();
  }
}, 30000);

</script>

</body>
</html>
