<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Honesty Box Code Checker</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
text-align:center;
padding:40px;
}

.box{
background:white;
padding:25px;
margin:auto;
width:380px;
border-radius:8px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
margin-bottom:25px;
}

button{
padding:10px 20px;
font-size:16px;
cursor:pointer;
margin-top:10px;
}

input{
padding:8px;
font-size:16px;
width:220px;
text-align:center;
}

.result{
margin-top:15px;
font-size:18px;
}

</style>

</head>

<body>

<h1>Honesty Box Admin</h1>

<div class="box">

<h2>Check Code From Payment Time</h2>

<p>Select payment time (GMT)</p>

<input type="datetime-local" id="timeInput">

<br>

<button onclick="checkCode()">Check Code</button>

<div id="result" class="result"></div>

</div>


<div class="box">

<h2>Payment Simulator</h2>

<p>Simulates a customer payment now</p>

<button onclick="simulatePayment()">Simulate Payment</button>

<div id="simResult" class="result"></div>

</div>


<script>

const SECRET = "WH-Eggs-2026-HonestyBox"
const WINDOW_MINUTES = 5


function generatePIN(window){

let hash = 0
const str = SECRET + window

for(let i=0;i<str.length;i++){

hash = ((hash << 5) - hash) + str.charCodeAt(i)
hash = hash & hash

}

let pin = Math.abs(hash) % 10000

return pin.toString().padStart(4,'0')

}


function checkCode(){

const input = document.getElementById("timeInput").value

if(!input){

document.getElementById("result").innerHTML = "Please select a time"

return

}

const gmt = new Date(input)

const minutes = Math.floor(gmt.getTime()/60000)

const window = Math.floor(minutes / WINDOW_MINUTES)

const prev = generatePIN(window-1)
const current = generatePIN(window)
const next = generatePIN(window+1)

document.getElementById("result").innerHTML =

"Previous Code: <b>"+prev+"</b><br>"+
"Valid Code: <b>"+current+"</b><br>"+
"Next Code: <b>"+next+"</b>"

}


function simulatePayment(){

const now = new Date()

const minutes = Math.floor(now.getTime()/60000)

const window = Math.floor(minutes / WINDOW_MINUTES)

const code = generatePIN(window)

document.getElementById("simResult").innerHTML =

"Payment Time (GMT): <b>"+now.toISOString().slice(0,19).replace("T"," ")+"</b><br>"+
"Generated Door Code: <b>"+code+"</b>"

}


function setDefaultTime(){

const now = new Date()

const iso = now.toISOString().slice(0,16)

document.getElementById("timeInput").value = iso

}

setDefaultTime()

</script>

</body>

</html>
