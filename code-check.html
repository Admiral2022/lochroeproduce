<!DOCTYPE html>
<html>
<head>
<title>Windy Hollow Code Check</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
text-align:center;
background:#f4f4f4;
padding:40px;
}

h1{
font-size:28px;
}

input{
font-size:18px;
padding:10px;
margin:10px;
}

button{
font-size:18px;
padding:12px 20px;
background:#0b7a16;
color:white;
border:none;
border-radius:6px;
}

.result{
margin-top:30px;
font-size:22px;
}

</style>

</head>

<body>

<h1>Windy Hollow Code Lookup</h1>

<p>Enter GMT Date & Time</p>

<input type="datetime-local" id="timeInput">

<br>

<button onclick="checkCode()">Check Code</button>

<div class="result" id="result"></div>

<script>

const SECRET = "WH-Eggs-2026-HonestyBox";

async function sha256(message){

const msgBuffer = new TextEncoder().encode(message);
const hashBuffer = await crypto.subtle.digest("SHA-256", msgBuffer);
const hashArray = Array.from(new Uint8Array(hashBuffer));
const hashHex = hashArray.map(b => b.toString(16).padStart(2,"0")).join("");
return hashHex;

}

async function generatePIN(window){

const hash = await sha256(SECRET + window);

const lastDigits = hash.replace(/\D/g,"").slice(-4);

return lastDigits.padStart(4,"0");

}

async function checkCode(){

const input = document.getElementById("timeInput").value;

if(!input){
alert("Enter a time");
return;
}

const unix = Math.floor(new Date(input).getTime()/1000);

const window = Math.floor(unix / 300);

const current = await generatePIN(window);
const previous = await generatePIN(window - 1);
const next = await generatePIN(window + 1);

document.getElementById("result").innerHTML =

"<p><b>Previous Code:</b> "+previous+"</p>" +
"<p><b>Valid Code:</b> "+current+"</p>" +
"<p><b>Next Code:</b> "+next+"</p>";

}

</script>

</body>
</html>
