<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8" />
 <meta name="viewport" content="width=device-width, initial-scale=1" />
 <title>Honesty Box Admin</title>
 <style>
   body {
     font-family: Arial, sans-serif;
     background: #f4f4f4;
     text-align: center;
     padding: 30px 15px;
     color: #111;
     margin: 0;
   }

   h1 {
     margin: 10px 0 25px 0;
   }

   .box {
     background: white;
     max-width: 480px;
     margin: 0 auto 24px auto;
     padding: 24px;
     border-radius: 10px;
     box-shadow: 0 0 12px rgba(0,0,0,0.15);
   }

   h2 {
     margin-top: 0;
   }

   p {
     line-height: 1.5;
   }

   input {
     font-size: 18px;
     padding: 10px;
     margin: 10px 0 14px 0;
     width: 260px;
     max-width: 90%;
     text-align: center;
   }

   button {
     font-size: 18px;
     padding: 12px 20px;
     background: #0b7a16;
     color: white;
     border: none;
     border-radius: 6px;
     cursor: pointer;
   }

   button:hover {
     background: #095f12;
   }

   .result {
     margin-top: 22px;
     font-size: 22px;
     line-height: 1.7;
   }

   .code {
     font-weight: bold;
   }

   .small {
     font-size: 15px;
     color: #444;
     margin-bottom: 10px;
   }
 </style>
</head>
<body>

 <h1>Honesty Box Admin</h1>

 <div class="box">
   <h2>Check Code From Payment Time</h2>
   <p>Select payment time (GMT)</p>
   <input type="datetime-local" id="timeInput">
   <br>
   <button onclick="checkCode()">Check Code</button>
   <div class="result" id="result"></div>
 </div>

 <div class="box">
   <h2>Payment Simulator</h2>
   <p>Simulates a customer payment now</p>
   <button onclick="simulatePayment()">Simulate Payment</button>
   <div class="result" id="simResult"></div>
 </div>

 <script>
   const SECRET = "WH-Eggs-2026-HonestyBox";
   const WINDOW_SECS = 300;
   const ADMIN_CODE = 2489;

   function customerCodeForWindow(window) {
     let w = Number(window) >>> 0;
     let h = 2166136261 >>> 0;

     for (let i = 0; i < SECRET.length; i++) {
       h ^= SECRET.charCodeAt(i);
       h = Math.imul(h, 16777619) >>> 0;
     }

     h ^= ":".charCodeAt(0);
     h = Math.imul(h, 16777619) >>> 0;

     for (let i = 0; i < 4; i++) {
       const b = (w >>> (8 * i)) & 0xFF;
       h ^= b;
       h = Math.imul(h, 16777619) >>> 0;
     }

     let code = h % 10000;

     if (code === ADMIN_CODE) {
       code = (code + 1) % 10000;
     }

     return String(code).padStart(4, "0");
   }

   function toGmtDisplay(dateObj) {
     const y = dateObj.getUTCFullYear();
     const mo = String(dateObj.getUTCMonth() + 1).padStart(2, "0");
     const d = String(dateObj.getUTCDate()).padStart(2, "0");
     const hh = String(dateObj.getUTCHours()).padStart(2, "0");
     const mm = String(dateObj.getUTCMinutes()).padStart(2, "0");
     const ss = String(dateObj.getUTCSeconds()).padStart(2, "0");
     return `${y}-${mo}-${d} ${hh}:${mm}:${ss}`;
   }

   function checkCode() {
     const input = document.getElementById("timeInput").value;

     if (!input) {
       document.getElementById("result").innerHTML = "Enter a time.";
       return;
     }

     const gmtDate = new Date(input + ":00Z");
     const epoch = Math.floor(gmtDate.getTime() / 1000);
     const windowNumber = Math.floor(epoch / WINDOW_SECS);

     const prev = customerCodeForWindow(windowNumber - 1);
     const current = customerCodeForWindow(windowNumber);
     const next = customerCodeForWindow(windowNumber + 1);

     document.getElementById("result").innerHTML =
       `<div class="small">GMT time checked: ${toGmtDisplay(gmtDate)}</div>
        <div>Previous Code: <span class="code">${prev}</span></div>
        <div>Valid Code: <span class="code">${current}</span></div>
        <div>Next Code: <span class="code">${next}</span></div>`;
   }

   function simulatePayment() {
     const now = new Date();
     const epoch = Math.floor(now.getTime() / 1000);
     const windowNumber = Math.floor(epoch / WINDOW_SECS);

     const prev = customerCodeForWindow(windowNumber - 1);
     const current = customerCodeForWindow(windowNumber);
     const next = customerCodeForWindow(windowNumber + 1);

     document.getElementById("simResult").innerHTML =
       `<div class="small">Payment Time (GMT): ${toGmtDisplay(now)}</div>
        <div>Previous Code: <span class="code">${prev}</span></div>
        <div>Generated Door Code: <span class="code">${current}</span></div>
        <div>Next Code: <span class="code">${next}</span></div>`;
   }
 </script>

</body>
</html>
