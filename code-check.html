<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Honesty Box Code Checker</title>

<style>
body{
font-family:Arial;
background:#f4f4f4;
text-align:center;
padding:40px;
}

.box{
background:white;
padding:25px;
margin:auto;
width:380px;
border-radius:8px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
margin-bottom:25px;
}

button{
padding:10px 20px;
font-size:16px;
cursor:pointer;
margin-top:10px;
}

input{
padding:8px;
font-size:16px;
width:200px;
text-align:center;
}
</style>

</head>

<body>

<h1>Honesty Box Admin</h1>

<!-- TIME LOOKUP TOOL -->

<div class="box">

<h2>Check Code From Payment Time</h2>

<p>Enter payment time (GMT)</p>

<input id="timeInput" placeholder="YYYY-MM-DD HH:MM">

<br>

<button onclick="checkCode()">Check Code</button>

<p id="result"></p>

</div>


<!-- PAYMENT SIMULATOR -->

<div class="box">

<h2>Payment Simulator</h2>

<p>Simulates a customer payment right now</p>

<button onclick="simulatePayment()">Simulate Payment</button>

<p id="simTime"></p>

<p id="simCode"></p>

</div>


<script>

const SECRET = "WH-Eggs-2026-HonestyBox";

const WINDOW_MINUTES = 5;


function generatePIN(window){

let hash = 0;

const str = SECRET + window;

for(let i=0;i<str.length;i++){

hash = ((hash << 5) - hash) + str.charCodeAt(i);

hash = hash & hash;

}

let pin = Math.abs(hash) % 10000;

return pin.toString().padStart(4,'0');

}


function checkCode(){

const input = document.getElementById("timeInput").value;

if(!input){

document.getElementById("result").innerHTML = "Enter a time";

return;

}

const gmt = new Date(input + " UTC");

const minutes = Math.floor(gmt.getTime()/60000);

const window = Math.floor(minutes / WINDOW_MINUTES);


const prev = generatePIN(window-1);

const current = generatePIN(window);

const next = generatePIN(window+1);


document.getElementById("result").innerHTML =

"<br>Previous Code: <b>"+prev+"</b>" +

"<br>Valid Code: <b>"+current+"</b>" +

"<br>Next Code: <b>"+next+"</b>";

}


function simulatePayment(){

const now = new Date();

const gmt = new Date(now.toUTCString());

const minutes = Math.floor(gmt.getTime()/60000);

const window = Math.floor(minutes / WINDOW_MINUTES);

const code = generatePIN(window);


document.getElementById("simTime").innerHTML =

"Payment Time (GMT): <b>"+

gmt.toISOString().slice(0,19).replace("T"," ")

+"</b>";


document.getElementById("simCode").innerHTML =

"Generated Door Code: <b>"+code+"</b>";

}

</script>

</body>

</html>
